<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/TAB-ICON.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="MPRAR Portal — Manage timesheets, absences, onboarding, HR compliance, and payroll from one place." />

    <title>MPRAR HR Portal</title>

    <!-- DNS Prefetch (Low Priority Origins) -->
    <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />
    <link rel="dns-prefetch" href="https://www.googleapis.com" />

    <!-- Critical Preconnects (Keep Minimal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ✅ Non-Blocking Google Fonts -->
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'">

    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap">
    </noscript>

    <!-- Module Preloading (Only if really critical) -->
    <link rel="modulepreload" href="/src/main.jsx" />
</head>

<body>
    <div id="root"></div>

    <!-- Main App Entry -->
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
